<body>

<h1>DCA vs Lump Sum Calculator</h1>

<input id="a" placeholder="Amount / Investment">
<input id="b" placeholder="Price / Periods">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<script>

</script>
