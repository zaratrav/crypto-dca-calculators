<title>DCA Portfolio Value Estimator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>DCA Portfolio Value Estimator</h1>

<input id="a" placeholder="Amount / Investment">
<input id="b" placeholder="Price / Periods">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let total=+a.value||0;let growth=+b.value||0;res.innerText='$'+(total*(1+growth/100)).toFixed(2);} 
</script>

</body>
