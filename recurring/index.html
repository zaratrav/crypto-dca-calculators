<!DOCTYPE html>
<html>
<head>
<title>Recurring Buy Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Recurring Buy Calculator</h1>

<input id="a" placeholder="Amount / Investment">
<input id="b" placeholder="Price / Periods">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let invest=+a.value||0;let periods=+b.value||1;res.innerText='$'+(invest*periods).toFixed(2);} 
</script>

</body>
</html>
